<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Farm &amp; Family</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<header id="site-header"></header>

<main class="section">
  <div class="container">
    <div class="form-card">
      <h2 style="margin-top:0;">Create your account</h2>
      <p class="muted">Join as a customer, a verified farmer, or a wholesale buyer.</p>
      <div id="register-error"></div>
      <form id="register-form">
        <div class="field">
          <label>I am a…</label>
          <select id="role">
            <option value="customer">Customer</option>
            <option value="farmer">Farmer</option>
            <option value="wholesale">Restaurant / Retailer / Wholesale buyer</option>
          </select>
        </div>
        <div class="field"><label>Full name</label><input id="name" required></div>
        <div class="field"><label>Email</label><input type="email" id="email" required></div>
        <div class="field"><label>Password</label><input type="password" id="password" minlength="6" required></div>
        <button class="btn btn-primary btn-block" type="submit">Create account</button>
      </form>
      <p class="muted" style="margin-top:16px; text-align:center;">Already have an account? <a href="login.html" style="font-weight:600; color:var(--forest); text-decoration:underline;">Log in</a></p>
    </div>
  </div>
</main>

<footer id="site-footer"></footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
  renderHeader("");
  renderFooter();
  const roleParam = new URLSearchParams(location.search).get("role");
  if (roleParam) document.getElementById("role").value = roleParam;

  document.getElementById("register-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("register-error");
    try {
      const data = await api.register({
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        role: document.getElementById("role").value
      });
      auth.setSession(data.token, data.user);
      location.href = data.user.role === "farmer" ? "farmer-dashboard.html" : data.user.role === "wholesale" ? "wholesale.html" : "account.html";
    } catch (err) {
      errEl.innerHTML = `<div class="form-error">${err.message}</div>`;
    }
  });
</script>
</body>
</html>
