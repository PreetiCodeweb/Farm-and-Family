<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — Farm &amp; Family</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<header id="site-header"></header>

<main class="section">
  <div class="container">
    <h1>Your Cart</h1>
    <div class="two-col" style="align-items:flex-start; margin-top:20px;">
      <div id="cart-lines"><p class="skeleton-text">Loading your cart…</p></div>
      <div class="form-card" style="max-width:100%;">
        <h3 style="margin-top:0;">Order summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="sum-subtotal">₹0</span></div>
        <div class="summary-row"><span>Delivery</span><span id="sum-delivery">₹0</span></div>
        <div class="summary-row total"><span>Total</span><span id="sum-total">₹0</span></div>
        <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:18px;" id="checkout-btn">Proceed to checkout</a>
        <p class="muted" style="font-size:0.8rem; margin-top:10px;">Free delivery on orders over ₹500.</p>
      </div>
    </div>
  </div>
</main>

<footer id="site-footer"></footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script src="js/render.js"></script>
<script>
  renderHeader("shop.html");
  renderFooter();

  async function loadCart() {
    const linesEl = document.getElementById("cart-lines");
    try {
      const { items, total } = await api.getCart(auth.cartOwnerId());
      if (!items.length) {
        linesEl.innerHTML = `<div class="empty-state">Your cart is empty. <a href="shop.html" class="tag-link" style="font-weight:600;">Start shopping →</a></div>`;
        document.getElementById("checkout-btn").classList.add("btn-ghost");
        document.getElementById("checkout-btn").style.pointerEvents = "none";
      } else {
        linesEl.innerHTML = items.map((i) => `
          <div class="cart-line" data-id="${i.productId}">
            <div class="thumb">🌾</div>
            <div>
              <strong>${i.product ? i.product.name : "Product"}</strong>
              <div class="muted" style="font-size:0.85rem;">${i.product ? money(i.product.price) + " / " + i.product.unit : ""}</div>
            </div>
            <div class="qty-control">
              <button type="button" class="qty-minus">−</button>
              <span class="qty-val">${i.quantity}</span>
              <button type="button" class="qty-plus">+</button>
            </div>
            <div><strong>${money(i.lineTotal)}</strong></div>
            <button class="btn btn-ghost btn-sm remove-btn">Remove</button>
          </div>
        `).join("");
      }
      const subtotal = total;
      const delivery = subtotal >= 500 || subtotal === 0 ? 0 : 40;
      document.getElementById("sum-subtotal").textContent = money(subtotal);
      document.getElementById("sum-delivery").textContent = delivery ? money(delivery) : "Free";
      document.getElementById("sum-total").textContent = money(subtotal + delivery);

      linesEl.querySelectorAll(".cart-line").forEach((line) => {
        const productId = line.dataset.id;
        const qtyVal = line.querySelector(".qty-val");
        line.querySelector(".qty-plus").addEventListener("click", async () => {
          const newQty = Number(qtyVal.textContent) + 1;
          await api.updateCartItem(auth.cartOwnerId(), productId, newQty);
          loadCart(); refreshCartBadge();
        });
        line.querySelector(".qty-minus").addEventListener("click", async () => {
          const newQty = Math.max(1, Number(qtyVal.textContent) - 1);
          await api.updateCartItem(auth.cartOwnerId(), productId, newQty);
          loadCart(); refreshCartBadge();
        });
        line.querySelector(".remove-btn").addEventListener("click", async () => {
          await api.removeCartItem(auth.cartOwnerId(), productId);
          loadCart(); refreshCartBadge();
        });
      });
    } catch (e) {
      linesEl.innerHTML = `<div class="empty-state">Couldn't load your cart.</div>`;
    }
  }
  loadCart();
</script>
</body>
</html>
