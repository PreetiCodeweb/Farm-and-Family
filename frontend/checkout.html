<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Farm &amp; Family</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<header id="site-header"></header>

<main class="section">
  <div class="container">
    <h1>Checkout</h1>
    <div id="checkout-body">
      <p class="skeleton-text">Loading…</p>
    </div>
  </div>
</main>

<footer id="site-footer"></footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script src="js/render.js"></script>
<script>
  renderHeader("shop.html");
  renderFooter();
  const body = document.getElementById("checkout-body");

  async function init() {
    if (!auth.isLoggedIn()) {
      body.innerHTML = `<div class="form-card" style="margin:0;"><p>Please log in to complete checkout — your cart is saved.</p><a href="login.html?next=checkout.html" class="btn btn-primary btn-block">Log in to continue</a></div>`;
      return;
    }
    const { items, total } = await api.getCart(auth.cartOwnerId());
    if (!items.length) {
      body.innerHTML = `<div class="empty-state">Your cart is empty. <a href="shop.html" class="tag-link">Go shopping →</a></div>`;
      return;
    }
    const delivery = total >= 500 ? 0 : 40;
    body.innerHTML = `
      <div class="two-col" style="align-items:flex-start;">
        <div class="form-card" style="margin:0; max-width:100%;">
          <h3 style="margin-top:0;">Delivery address</h3>
          <div id="checkout-error"></div>
          <div class="field"><label>Full name</label><input id="c-name" value="${auth.getUser().name}"></div>
          <div class="field"><label>Phone number</label><input id="c-phone" placeholder="10-digit mobile number"></div>
          <div class="field"><label>Address line</label><input id="c-address" placeholder="House no, street, area"></div>
          <div class="field-row">
            <div class="field"><label>City</label><input id="c-city"></div>
            <div class="field"><label>PIN code</label><input id="c-pin"></div>
          </div>
          <div class="field">
            <label>Payment method</label>
            <select id="c-payment">
              <option value="cod">Cash on Delivery</option>
              <option value="upi">UPI</option>
              <option value="card">Credit / Debit Card</option>
            </select>
          </div>
          <button class="btn btn-primary btn-block" id="place-order-btn">Place order — ${money(total + delivery)}</button>
        </div>
        <div class="form-card" style="margin:0; max-width:100%;">
          <h3 style="margin-top:0;">Order items</h3>
          ${items.map((i) => `<div class="summary-row"><span>${i.product.name} × ${i.quantity}</span><span>${money(i.lineTotal)}</span></div>`).join("")}
          <div class="summary-row"><span>Delivery</span><span>${delivery ? money(delivery) : "Free"}</span></div>
          <div class="summary-row total"><span>Total</span><span>${money(total + delivery)}</span></div>
        </div>
      </div>
    `;

    document.getElementById("place-order-btn").addEventListener("click", async () => {
      const errEl = document.getElementById("checkout-error");
      const name = document.getElementById("c-name").value.trim();
      const phone = document.getElementById("c-phone").value.trim();
      const address = document.getElementById("c-address").value.trim();
      const city = document.getElementById("c-city").value.trim();
      const pin = document.getElementById("c-pin").value.trim();
      const paymentMethod = document.getElementById("c-payment").value;
      if (!name || !phone || !address || !city || !pin) {
        errEl.innerHTML = `<div class="form-error">Please fill in all delivery details.</div>`;
        return;
      }
      const btn = document.getElementById("place-order-btn");
      btn.textContent = "Placing order…"; btn.disabled = true;
      try {
        const order = await api.placeOrder({
          items: items.map((i) => ({ productId: i.productId, quantity: i.quantity })),
          deliveryAddress: { name, phone, address, city, pin },
          paymentMethod
        });
        location.href = `account.html?order=${order.id}`;
      } catch (e) {
        errEl.innerHTML = `<div class="form-error">${e.message}</div>`;
        btn.textContent = "Place order"; btn.disabled = false;
      }
    });
  }
  init();
</script>
</body>
</html>
